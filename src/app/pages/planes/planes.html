<div class="container my-5">
  <h2 class="text-center text-danger fw-bold mb-5">Planes de Financiación</h2>

  <div class="row text-center">

    <div class="col-md-4" *ngFor="let plan of planes">
      <div class="card shadow p-4 h-100"
           [ngClass]="{'border-danger': plan.destacado}">

        <img [src]="plan.imagen" class="img-fluid mb-3 rounded" alt="plan">

        <h4 class="text-danger">{{ plan.nombre }}</h4>
        <h2 class="fw-bold">${{ plan.precio }}</h2>
        <p>Cuota mensual</p>
        <p>{{ plan.meses }} Visitas</p>

        <button
          class="w-100"
          [ngClass]="plan.destacado ? 'btn btn-danger' : 'btn btn-outline-danger'">
          Solicitar
        </button>

      </div>
    </div>

  </div>
</div>
