<div class="container my-5">
  <h2 class="text-center text-danger fw-bold mb-4">Contáctanos</h2>

  <div class="card shadow p-4">
    <form #f="ngForm" (ngSubmit)="guardar(f.value)">

      <div class="mb-3">
        <label class="form-label">Nombre</label>
        <input
          type="text"
          class="form-control"
          name="nombre"
          ngModel
          required>
      </div>

      <div class="mb-3">
        <label class="form-label">Correo</label>
        <input
          type="email"
          class="form-control"
          name="correo"
          ngModel
          required>
      </div>

      <div class="mb-3">
        <label class="form-label">Mensaje</label>
        <textarea
          class="form-control"
          rows="4"
          name="mensaje"
          ngModel
          required></textarea>
      </div>

      <button type="submit" class="btn btn-danger w-100">
        Enviar Mensaje
      </button>

    </form>
  </div>
</div>|
